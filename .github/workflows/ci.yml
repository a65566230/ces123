name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      PLAYWRIGHT_HEADLESS: "true"
      DEFAULT_LLM_PROVIDER: "openai"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve Chromium Path
        shell: bash
        run: |
          BROWSER_PATH="$(which google-chrome || which google-chrome-stable || which chromium || which chromium-browser || which microsoft-edge || true)"
          if [ -z "$BROWSER_PATH" ]; then
            echo "No Chromium-based browser found on runner"
            exit 1
          fi
          echo "PLAYWRIGHT_EXECUTABLE_PATH=$BROWSER_PATH" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Module verification
        run: npm run verify

      - name: Manifest verification
        run: npm run verify:manifest

      - name: Skill verification
        run: npm run verify:skill

      - name: Package smoke test
        run: npm run package:smoke
